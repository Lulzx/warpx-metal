name: Portability

on:
  push:
    branches: [ci/portability, ci/portability-r2-scratch]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  linux-cpu-gcc:
    name: linux-cpu-gcc
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      AMREX_REPO: https://github.com/AMReX-Codes/amrex.git
      AMREX_REF: fa795322b44fff24fef3a795c3b00d24e015ee42
      WARPX_REPO: https://github.com/ECP-WarpX/WarpX.git
      WARPX_REF: f7db079f9a8ca96d179e02709a29fe6c027ed8ed
      CMAKE_BUILD_PARALLEL_LEVEL: "2"
      CMAKE_BUILD_TYPE: Release
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Check out patch repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Linux build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            ccache \
            cmake \
            gfortran \
            git \
            ninja-build \
            pkg-config \
            python3

      - name: Restore ccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .ccache
          key: ${{ runner.os }}-gcc-ccache-${{ hashFiles('patches/**', '.github/workflows/portability.yml') }}
          restore-keys: |
            ${{ runner.os }}-gcc-ccache-

      - name: Clone pinned upstream sources
        shell: bash
        run: |
          set -euo pipefail

          sysctl() {
            if [ "${1:-}" = "-n" ] && [ "${2:-}" = "hw.ncpu" ]; then
              nproc
              return 0
            fi
            command sysctl "$@"
          }

          source scripts/env.sh
          export NPROC="$(nproc)"

          mkdir -p extern
          git clone --filter=blob:none "${AMREX_REPO}" "${AMREX_SOURCE_DIR}"
          git -C "${AMREX_SOURCE_DIR}" checkout --detach "${AMREX_REF}"
          git clone --filter=blob:none "${WARPX_REPO}" "${WARPX_SOURCE_DIR}"
          git -C "${WARPX_SOURCE_DIR}" checkout --detach "${WARPX_REF}"

          test "$(git -C "${AMREX_SOURCE_DIR}" rev-parse HEAD)" = "${AMREX_REF}"
          test "$(git -C "${WARPX_SOURCE_DIR}" rev-parse HEAD)" = "${WARPX_REF}"

          {
            echo "AMReX ${AMREX_REF}"
            echo "WarpX ${WARPX_REF}"
          } | tee upstream-pins.txt

      - name: Apply portability patches
        shell: bash
        run: |
          set -euo pipefail

          sysctl() {
            if [ "${1:-}" = "-n" ] && [ "${2:-}" = "hw.ncpu" ]; then
              nproc
              return 0
            fi
            command sysctl "$@"
          }

          source scripts/env.sh

          assert_exact_files() {
            local dir="$1"
            local label="$2"
            shift 2
            local expected=("$@")
            local actual=()
            local file

            while IFS= read -r -d '' file; do
              actual+=("$(basename "${file}")")
            done < <(find "${dir}" -maxdepth 1 -type f ! -name '.gitkeep' -print0 | sort -z)

            if (( ${#expected[@]} == 0 || ${#actual[@]} == 0 )); then
              echo "::error::${label}: empty manifest is forbidden"
              exit 1
            fi
            if (( ${#actual[@]} != ${#expected[@]} )); then
              echo "::error::${label}: expected ${#expected[@]} file(s), found ${#actual[@]}"
              printf 'expected: %s\n' "${expected[*]}"
              printf 'actual: %s\n' "${actual[*]}"
              exit 1
            fi

            local index
            for index in "${!expected[@]}"; do
              if [ "${actual[index]}" != "${expected[index]}" ]; then
                echo "::error::${label}: manifest mismatch at index ${index}"
                printf 'expected: %s\n' "${expected[*]}"
                printf 'actual: %s\n' "${actual[*]}"
                exit 1
              fi
            done

            echo "${label}: exact ${#actual[@]}-file manifest verified"
          }

          assert_patch_manifest() {
            local patch_dir="$1"
            local label="$2"
            shift 2
            local expected=("$@")
            local actual=()
            local patch

            while IFS= read -r -d '' patch; do
              actual+=("$(basename "${patch}")")
            done < <(find "${patch_dir}" -maxdepth 1 -type f -name '*.patch' -print0 | sort -z)

            if (( ${#expected[@]} == 0 || ${#actual[@]} == 0 )); then
              echo "::error::${label}: zero patches is forbidden"
              exit 1
            fi
            if (( ${#actual[@]} != ${#expected[@]} )); then
              echo "::error::${label}: expected ${#expected[@]} patch(es), found ${#actual[@]}"
              printf 'expected: %s\n' "${expected[*]}"
              printf 'actual: %s\n' "${actual[*]}"
              exit 1
            fi

            local index
            for index in "${!expected[@]}"; do
              if [ "${actual[index]}" != "${expected[index]}" ]; then
                echo "::error::${label}: manifest mismatch at index ${index}"
                printf 'expected: %s\n' "${expected[*]}"
                printf 'actual: %s\n' "${actual[*]}"
                exit 1
              fi
            done

            echo "${label}: exact ${#actual[@]}-patch manifest verified"
          }

          apply_patch_manifest() {
            local repo_dir="$1"
            local patch_dir="$2"
            local label="$3"
            shift 3
            local manifest=("$@")
            local patch

            for patch in "${manifest[@]}"; do
              echo "::group::${label}: ${patch}"
              patch="${patch_dir}/${patch}"
              git -C "${repo_dir}" apply --check "${patch}"
              git -C "${repo_dir}" apply "${patch}"
              echo "::endgroup::"
            done

            echo "${label}: ${#manifest[@]} git patch(es) applied"
          }

          copy_amrex_replacement() {
            local src="$1"
            local dst="$2"
            local source_file="${PATCHES_DIR}/amrex/${src}"
            local target_file="${AMREX_SOURCE_DIR}/${dst}"

            test -f "${source_file}" || {
              echo "::error::Missing AMReX replacement file: ${source_file}"
              exit 1
            }
            test -f "${target_file}" || {
              echo "::error::AMReX replacement target does not exist: ${target_file}"
              exit 1
            }

            cp "${source_file}" "${target_file}"
            echo "AMReX replacement applied: ${dst}"
          }

          amrex_replacements=(
            AMReXSYCL.cmake
            AMReX_Random.cpp
            AMReX_RandomEngine.H
          )
          amrex_post_patches=(
            0004-metal-pic-rng-reduction-fixes.patch
          )
          warpx_patches=(
            0001-metal-source-identity.patch
            0002-fix-addplasma-metal-parser-momentum-oob.patch
            0003-correct-macos-memory-guard-available-memory.patch
          )

          assert_exact_files "${PATCHES_DIR}/amrex" "AMReX replacements" "${amrex_replacements[@]}"
          assert_patch_manifest "${PATCHES_DIR}/amrex-post" "AMReX post" "${amrex_post_patches[@]}"
          assert_patch_manifest "${PATCHES_DIR}/warpx" "WarpX" "${warpx_patches[@]}"

          copy_amrex_replacement "AMReXSYCL.cmake" "Tools/CMake/AMReXSYCL.cmake"
          copy_amrex_replacement "AMReX_RandomEngine.H" "Src/Base/AMReX_RandomEngine.H"
          copy_amrex_replacement "AMReX_Random.cpp" "Src/Base/AMReX_Random.cpp"
          apply_patch_manifest "${AMREX_SOURCE_DIR}" "${PATCHES_DIR}/amrex-post" "AMReX post" "${amrex_post_patches[@]}"
          apply_patch_manifest "${WARPX_SOURCE_DIR}" "${PATCHES_DIR}/warpx" "WarpX" "${warpx_patches[@]}"

          git -C "${AMREX_SOURCE_DIR}" diff --check
          git -C "${WARPX_SOURCE_DIR}" diff --check

      - name: Configure CPU WarpX build
        shell: bash
        run: |
          set -euo pipefail

          sysctl() {
            if [ "${1:-}" = "-n" ] && [ "${2:-}" = "hw.ncpu" ]; then
              nproc
              return 0
            fi
            command sysctl "$@"
          }

          source scripts/env.sh
          BUILD_DIR="${WARPX_SOURCE_DIR}/build-linux-cpu-gcc"

          ccache --max-size=2G
          ccache --zero-stats

          cmake -S "${WARPX_SOURCE_DIR}" -B "${BUILD_DIR}" \
            -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE="${CMAKE_BUILD_TYPE}" \
            -DAMReX_GPU_BACKEND=NONE \
            -DAMReX_MPI=OFF \
            -DAMReX_OMP=ON \
            -DAMReX_FORTRAN=OFF \
            -DWarpX_COMPUTE=OMP \
            -DWarpX_PRECISION=SINGLE \
            -DWarpX_PARTICLE_PRECISION=SINGLE \
            -DWarpX_DIMS="2;3" \
            -DWarpX_MPI=OFF \
            -DWarpX_FFT=OFF \
            -DWarpX_QED=OFF \
            -DWarpX_OPENPMD=OFF \
            -DWarpX_amrex_src="${AMREX_SOURCE_DIR}"

      - name: Compile CPU WarpX
        shell: bash
        run: |
          set -euo pipefail

          sysctl() {
            if [ "${1:-}" = "-n" ] && [ "${2:-}" = "hw.ncpu" ]; then
              nproc
              return 0
            fi
            command sysctl "$@"
          }

          source scripts/env.sh
          BUILD_DIR="${WARPX_SOURCE_DIR}/build-linux-cpu-gcc"

          cmake --build "${BUILD_DIR}" --parallel "${CMAKE_BUILD_PARALLEL_LEVEL}"

          find "${BUILD_DIR}/bin" -maxdepth 1 -type f -perm -111 -name 'warpx.*' -print | sort | tee built-binaries.txt
          test -s built-binaries.txt || {
            echo "::error::No WarpX executable found after build"
            exit 1
          }

          ccache --show-stats
